name: Publish to npm

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build
        run: bun run build

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'

      - name: Publish mint-tsdocs
        run: npm publish --provenance --access public

      - name: Publish mintlify-tsdocs (alias)
        run: ./scripts/publish-alias.sh

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "Release ${{ github.ref_name }}" \
            --notes "Published to npm:
          - [\`mint-tsdocs@${{ github.ref_name }}\`](https://www.npmjs.com/package/mint-tsdocs)
          - [\`mintlify-tsdocs@${{ github.ref_name }}\`](https://www.npmjs.com/package/mintlify-tsdocs)"
